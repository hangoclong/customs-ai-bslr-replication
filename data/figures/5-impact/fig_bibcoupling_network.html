            function hexToRgb(hex) {
                hex = hex.replace('#', '');
                return {
                    r: parseInt(hex.substring(0, 2), 16),
                    g: parseInt(hex.substring(2, 4), 16),
                    b: parseInt(hex.substring(4, 6), 16)
                };
            }

            network.on("beforeDrawing", function(ctx) {
                var positions = network.getPositions();
                for (var nodeId in positions) {
                    var pos = positions[nodeId];
                    var meta = nodeMeta[nodeId];
                    if (!meta) continue;
                    var rgb = hexToRgb(meta.color);
                    var radius = meta.size;
                    ctx.save();
                    var grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
                    grad.addColorStop(0.0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.95)');
                    grad.addColorStop(0.5, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.95)');
                    grad.addColorStop(0.8, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.80)');
                    grad.addColorStop(1.0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.65)');
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.restore();
                }
            });

            network.on("afterDrawing", function(ctx) {
                var positions = network.getPositions();
                var scale = network.getScale();
                for (var nodeId in positions) {
                    var pos = positions[nodeId];
                    var meta = nodeMeta[nodeId];
                    if (!meta) continue;
                    var fontSize = meta.fontSize;
                    if (fontSize * scale < 3) continue;
                    ctx.save();
                    ctx.font = fontSize + "px Verdana, Geneva, sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#333333";
                    ctx.fillText(meta.label, pos.x, pos.y);
                    ctx.restore();
                }
            });

            var edgeOrigColors = {};
            edges.forEach(function(edge) { edgeOrigColors[edge.id] = edge.color; });
            network.on("hoverNode", function(params) {
                var connEdges = network.getConnectedEdges(params.node);
                var updates = connEdges.map(function(eid) {
                    var orig = edgeOrigColors[eid] || 'rgba(200,200,200,0.45)';
                    var lastComma = orig.lastIndexOf(',');
                    return {id: eid, color: orig.substring(0, lastComma) + ',0.85)'};
                });
                edges.update(updates);
            });
            network.on("blurNode", function(params) {
                var connEdges = network.getConnectedEdges(params.node);
                var updates = connEdges.map(function(eid) {
                    return {id: eid, color: edgeOrigColors[eid] || 'rgba(200,200,200,0.45)'};
                });
                edges.update(updates);
            });
        }, 1000);
    });
